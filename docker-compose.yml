# Local PostgreSQL for development. Start it with:  docker compose up -d
# Stop:  docker compose down   (add -v to also delete the data volume)
services:
  db:
    image: postgres:16-alpine
    container_name: trackr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trackr
      POSTGRES_PASSWORD: trackr
      POSTGRES_DB: trackr
    ports:
      - "5432:5432"
    volumes:
      - trackr_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackr -d trackr"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  trackr_pgdata:
